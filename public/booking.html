<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Project | SnowSkye AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f4f7fb;
  color:#1a1a1a;
}

/* NAVBAR */
.navbar{
  background:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.logo{
  font-weight:700;
  font-size:24px;
  color:#0077ff;
}
.nav-links a{
  margin-left:25px;
  text-decoration:none;
  color:#333;
  font-weight:500;
}
.nav-links a:hover{ color:#0077ff; }

/* CONTAINER */
.container{
  max-width:680px;
  margin:90px auto;
  background:white;
  padding:45px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}
.container h1{
  margin-bottom:10px;
  color:#0077ff;
}
.container p{
  margin-bottom:30px;
  color:#555;
  font-size:15px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:16px;
}
input, select, textarea{
  padding:15px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:15px;
}
textarea{ min-height:130px; }

button{
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#0077ff,#00c6ff);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

/* SUCCESS */
.success{
  background:#d4edda;
  color:#155724;
  padding:16px;
  border-radius:12px;
  margin-top:18px;
  display:none;
  font-size:14px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  margin-top:60px;
  background:#0a0a0a;
  color:white;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .navbar{ padding:15px 20px; }
  .container{
    margin:50px 15px;
    padding:30px;
  }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SnowSkye AI</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<!-- PROJECT FORM -->
<div class="container">
  <h1>Start Your Project</h1>
  <p>
    Request your AI chatbot or business website.  
    <b>Delivery in 24–48 hours.</b>
  </p>

  <form id="projectForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <input type="tel" id="phone" placeholder="Phone or WhatsApp" required>

    <select id="service" required>
      <option value="">Select Service</option>
      <option>AI Chatbot Installation ($75)</option>
      <option>Business Website Development ($150)</option>
      <option>Website + AI Chatbot Package ($250)</option>
      <option>Custom Project</option>
    </select>

    <input type="text" id="website" placeholder="Your Website URL (optional)">
    <textarea id="message" placeholder="Tell me about your project..."></textarea>

    <button type="submit" id="sendBtn">Submit Request</button>
  </form>

  <div class="success" id="successMsg">
    ✅ Request sent successfully! I will contact you shortly.
  </div>
</div>

<footer>
  SnowSkye AI © 2026<br>
  AI Chatbot & Website Developer
</footer>

<!-- ✅ FIXED & SECURE SCRIPT -->
<script>
const API_URL = "https://snowskye-web-app.onrender.com";

const form = document.getElementById("projectForm");
const successMsg = document.getElementById("successMsg");
const sendBtn = document.getElementById("sendBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const service = document.getElementById("service").value;
  const website = document.getElementById("website").value.trim();
  const message = document.getElementById("message").value.trim();

  if(!name || !email || !phone || !service){
    alert("Please complete all required fields.");
    return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = "Submitting...";

  const fullMessage = `
NEW PROJECT REQUEST

Name: ${name}
Email: ${email}
Phone: ${phone}
Service: ${service}
Website: ${website || "N/A"}

Details:
${message || "No additional message"}
`;

  try{
    const res = await fetch(API_URL + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email,
        message: fullMessage,
        source: "start_project_page"
      })
    });

    if(!res.ok) throw new Error("Server error");

    successMsg.style.display = "block";
    form.reset();

  }catch(err){
    alert("Something went wrong. Please contact snowskye16@gmail.com");
    console.error(err);
  }finally{
    sendBtn.disabled = false;
    sendBtn.textContent = "Submit Request";
  }
});
</script>

<!-- CHATBOT WIDGET -->
<script
  src="/widget.js"
  data-brand="SnowSkye AI"
  data-color="#38bdf8"
  data-logo="/icon-192.png"
  data-booking="https://calendly.com/dental"
></script>

</body>
</html>
